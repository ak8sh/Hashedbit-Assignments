<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Ecommerce Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div><img src="logo.jpg" alt="my MyShop" class="logo"></div>
        <div class="social">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <div class="container">

        <div class="sidebar">
            <h3>Categories</h3>
            <ul>
                <li>Shoes</li>
                <li>Clothing</li>
                <li>Accessories</li>
                <li>Home Items</li>
            </ul>

            <h3>Offers</h3>
            <p>Flat 20% Off</p>
            <p>Free Delivery</p>
        </div>

        <div class="main">
            <h2>Featured Products</h2>

            <div class="box-container">

                <div class="box">
                    <h3>T-Shirt</h3>
                    <img src="Product3.jpg" alt="Product">
                    <p>$900</p>
                </div>

                <div class="box">
                    <h3>Shoez</h3>
                    <img src="Product1.jpg" alt="Product">
                    <p>$1400</p>
                </div>

                <div class="box">
                    <h3>Loose T-shirt</h3>
                    <img src="product2.jpg" alt="Product">
                    <p>$500</p>
                </div>

            </div>
        </div>

    </div>

    <div class="footer">
        <p>© 2026 MyShop | All Rights Reserved</p>
        <p>Designed for learning purpose</p>
    </div>

</body>
</html>
